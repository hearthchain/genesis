<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hearth — bind your burn address</title>
<style>
  body { font: 16px/1.5 -apple-system, system-ui, sans-serif; max-width: 640px; margin: 3rem auto; padding: 0 1rem; color: #222; }
  h1 { font-size: 1.3rem; }
  code, .mono { font-family: ui-monospace, monospace; font-size: 0.9em; word-break: break-all; }
  .row { margin: 1rem 0; }
  input { width: 100%; padding: 0.5rem; font-family: ui-monospace, monospace; font-size: 0.9em; box-sizing: border-box; }
  button { padding: 0.6rem 1.2rem; font-size: 1rem; cursor: pointer; }
  #result { white-space: pre-wrap; background: #f5f5f5; padding: 0.8rem; border-radius: 6px; display: none; }
  .ok { color: #0a7a2f; } .err { color: #b00020; }
  .hint { color: #666; font-size: 0.9em; }
</style>
</head>
<body>
<h1>Bind your Waves address to a Hearth address</h1>
<p class="hint">Keeper Wallet signs a short statement with the key of your burning address. Your seed phrase never leaves the extension. The statement binds all burns from this address to the Hearth address below.</p>

<div class="row">Waves account (active in Keeper): <span id="source" class="mono">detecting Keeper…</span></div>
<div class="row">
  <label for="hearth">Hearth address to receive the credit:</label>
  <input id="hearth" placeholder="3H...">
</div>
<div class="row"><button id="sign" disabled>Sign binding in Keeper</button></div>
<div id="result"></div>
<div class="row hint" id="balanceLink"></div>

<script>
"use strict";
const MESSAGE_PREFIX = "hearth-genesis-binding:v1:";
const el = (id) => document.getElementById(id);
let source = null;

function show(kind, text) {
  const r = el("result");
  r.style.display = "block";
  r.className = kind;
  r.textContent = text;
}

async function waitKeeper(tries) {
  for (let i = 0; i < tries; i++) {
    if (window.KeeperWallet) return window.KeeperWallet;
    await new Promise((res) => setTimeout(res, 150));
  }
  return null;
}

async function init() {
  const params = new URLSearchParams(location.search);
  if (params.get("hearth")) el("hearth").value = params.get("hearth");

  const keeper = await waitKeeper(20);
  if (!keeper) {
    el("source").textContent = "Keeper Wallet not found: install the extension and reload";
    return;
  }
  try {
    const state = await keeper.publicState();
    source = state.account && state.account.address;
    if (!source) throw new Error("no active account in Keeper");
    el("source").textContent = source;
    el("sign").disabled = false;
  } catch (e) {
    el("source").textContent = "Keeper refused access: " + (e && e.message ? e.message : e);
  }
}

const HEARTH_SHAPE = /^[1-9A-HJ-NP-Za-km-z]{30,40}$/; // base58, address-sized; the server still verifies the checksum

async function sign() {
  const hearth = el("hearth").value.trim();
  if (!hearth) { show("err", "Enter the Hearth address first."); return; }
  if (!HEARTH_SHAPE.test(hearth)) {
    show("err", "This does not look like a Hearth address (base58, ~35 characters, starts with 3H). Nothing was signed.");
    return;
  }
  const message = MESSAGE_PREFIX + source + ":" + hearth;
  const b64 = btoa(String.fromCharCode(...new TextEncoder().encode(message)));
  try {
    const signed = await window.KeeperWallet.signCustomData({ version: 1, binary: "base64:" + b64 });
    const resp = await fetch("/api/bindings", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        source: source,
        hearth: hearth,
        publicKey: signed.publicKey,
        signature: signed.signature,
        format: "keeper-v1"
      })
    });
    const body = await resp.text();
    if (resp.status === 201) {
      show("ok", "Binding accepted (201).\nSigned statement: " + message + "\n" + body);
      const link = document.createElement("a");
      link.href = "/api/address/" + encodeURIComponent(hearth);
      link.textContent = "/api/address/" + hearth;
      const holder = el("balanceLink");
      holder.textContent = "Check the balance: ";
      holder.appendChild(link);
    } else {
      show("err", "Rejected (" + resp.status + "):\n" + body);
    }
  } catch (e) {
    show("err", "Keeper signing failed: " + (e && e.message ? e.message : e));
  }
}

el("sign").addEventListener("click", sign);
init();
</script>
</body>
</html>

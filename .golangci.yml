# Starter .golangci.yml for the strict preset described in SKILL.md.
# Drop into the repo root and adjust source paths.

version: "2"

run:
  timeout: 5m
  modules-download-mode: vendor

linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - copyloopvar
    - cyclop
    - dupl
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - forbidigo
    - funlen
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gomoddirectives
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - loggercheck
    - makezero
    - mirror
    - mnd
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - predeclared
    - promlinter
    - reassign
    - revive
    - rowserrcheck
    - sloglint
    - sqlclosecheck
    - staticcheck
    - testableexamples
    - testpackage
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace

  settings:
    cyclop:
      max-complexity: 30
    funlen:
      lines: 100
    gocognit:
      min-complexity: 20
    lll:
      line-length: 140
    govet:
      enable-all: true
      disable:
        - fieldalignment
      settings:
        shadow:
          strict: true
    errcheck:
      check-type-assertions: true
    exhaustive:
      check:
        - switch
        - map
    nolintlint:
      require-explanation: true
      require-specific: true
    gomodguard_v2:
      blocked:
        - module: github.com/golang/protobuf
          recommendations:
            - google.golang.org/protobuf
        - module: github.com/satori/go.uuid
          recommendations:
            - github.com/google/uuid
        - module: github.com/gofrs/uuid
          recommendations:
            - github.com/google/uuid

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - bodyclose
          - dupl
          - funlen
          - gochecknoglobals
          - goconst
          - gosec
          - lll
          - noctx
          - nonamedreturns

formatters:
  enable:
    - goimports
